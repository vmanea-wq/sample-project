name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Three parallel jobs: each restores npm + node_modules cache independently.
  quality:
    name: ${{ matrix.script }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        script: [lint, typecheck, build:vite, test:coverage]
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-deps

      - name: Run ${{ matrix.script }}
        run: npm run ${{ matrix.script }}

  security:
    name: Security (OSV, npm audit, Snyk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-deps

      - name: OSV-Scanner (lockfile)
        uses: google/osv-scanner-action@v2.3.8
        with:
          scan-args: '-L package-lock.json'

      - name: npm audit
        run: npm audit --audit-level=high

      - name: Snyk dependency scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "${SNYK_TOKEN:-}" ]; then
            echo "SNYK_TOKEN not set — skipping Snyk (add repository secret to enable)."
            exit 0
          fi
          npx --yes snyk@latest test --severity-threshold=high --file=package-lock.json

  docker:
    name: Docker image (BuildKit GHA cache)
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (layers cached in GHA)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: pocket-ledger:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ci-notify-failure:
    name: Slack — CI failure
    needs: [quality, security, docker]
    if: >-
      always() &&
      (
        needs.quality.result == 'failure' ||
        needs.security.result == 'failure' ||
        (needs.docker.result == 'failure' && github.event_name == 'push')
      )
    uses: ./.github/workflows/notify-slack.yml
    with:
      text: '${{ github.repository }} CI — ${{ github.ref_name }} @ ${{ github.sha }} — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
      status: failure
    secrets: inherit
